<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0c0e" />
    <meta
      name="description"
      content="JobRadar crawls job boards, rates every listing against your CV with AI, and tracks applications on a Kanban board."
    />
    <link rel="canonical" href="https://jobradar.saimjs.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>JobRadar — AI-powered job search &amp; application tracking</title>

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jobradar.saimjs.com/" />
    <meta property="og:title" content="JobRadar — AI-powered job search & application tracking" />
    <meta
      property="og:description"
      content="Crawl every job board at once, get AI-rated fit scores against your CV, and track applications on a Kanban board."
    />
    <meta property="og:image" content="https://jobradar.saimjs.com/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JobRadar — AI-powered job search & application tracking" />
    <meta
      name="twitter:description"
      content="Crawl every job board at once, get AI-rated fit scores against your CV, and track applications on a Kanban board."
    />
    <style>
      html {
        background-color: #0c0c0e;
        color-scheme: dark;
      }
      html:not(.dark) {
        background-color: #f3f5f9;
        color-scheme: light;
      }
    </style>
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var dark = saved !== "light";
        if (dark) document.documentElement.classList.add("dark");
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", dark ? "#0c0c0e" : "#f3f5f9");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
