<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0c0e" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      name="description"
      content="JobRadar crawls job boards, rates every listing against your CV with AI, and tracks applications on a Kanban board."
    />
    <link rel="canonical" href="https://jobradar.saimjs.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>JobRadar: AI job search and application tracking</title>

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jobradar.saimjs.com/" />
    <meta property="og:title" content="JobRadar: AI job search and application tracking" />
    <meta
      property="og:description"
      content="Crawl every job board at once, get AI-rated fit scores against your CV, and track applications on a Kanban board."
    />
    <meta property="og:image" content="https://jobradar.saimjs.com/favicon.svg" />
    <meta property="og:locale" content="en_IE" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JobRadar: AI job search and application tracking" />
    <meta
      name="twitter:description"
      content="Crawl every job board at once, get AI-rated fit scores against your CV, and track applications on a Kanban board."
    />
    <style>
      html {
        background-color: #0c0c0e;
        color-scheme: dark;
      }
      html:not(.dark) {
        background-color: #f3f5f9;
        color-scheme: light;
      }
    </style>
    <script>
      (function () {
        var dark = localStorage.getItem("theme") !== "light";
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "JobRadar",
        "url": "https://jobradar.saimjs.com/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "JobRadar crawls job boards, rates every listing against your CV with AI, and tracks applications on a Kanban board.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
